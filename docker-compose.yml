services:
  redis:
    image: redis:7-alpine
    container_name: sports-monitoring-redis
    ports:
      - "6379:6379"

  flower:
    image: mher/flower:2.0.1
    container_name: sports-monitoring-flower
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
